<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
  </head>
  <body>
    <div class="code-bg">&lt;/&gt;</div>
    <div class="code-bg2">{ }</div>
    <h1>Login</h1>
    <div class="login">
      <form id="formdc">
        <span>Username</span>
        <input
          type="text"
          placeholder="enter the username"
          name="username"
          id="username"
        />
         <span>Password</span>
        <input
          type="password"
          placeholder="enter the password"
          name="password"
          id="password"
        />
        <button type="submit" id="l">Login</button>
        <a href="" id="forgot">Forgot password?</a>
        <a href="" id="create">New here ? Create Account</a>
        <p id="message"></p>
      </form>
    </div>
    <script src="login.js"></script>
  </body>
</html>
