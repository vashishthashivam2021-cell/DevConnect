<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="feed.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">
  </head>
  <body>
  <div id="head">
  <h1>Developer's Profile</h1>

  </div>
    <div  id="imgcontainer">
      <img src="default.png" alt="profilephoto" id="mainphoto">
    </div>
    <div id="infocontainer">
  <div class="info">Full Name : <span id="fullname"></span></div>
<div class="info">Username : <span id="username"></span></div>
<div class="info">Number of Posts : <span id="postcount"></span></div>
    </div>
    
   

<div id="userposts"></div>

<script>

const username = localStorage.getItem("username");

// username show
document.getElementById("username").innerText = username;

// temporary full name
document.getElementById("fullname").innerText = username;

// posts count fetch
async function loadProfile(){

  const res = await fetch("/posts");
  const posts = await res.json();

  const userPosts = posts.filter(p => p.username === username);

  document.getElementById("postcount").innerText = userPosts.length;

}

loadProfile();
async function loadUserPosts(){

  const username = localStorage.getItem("username");

  const res = await fetch("/posts");
  const posts = await res.json();

  const container = document.getElementById("userposts");
  container.innerHTML="";

  posts
  .filter(post => post.username === username)
  .forEach(post => {

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <nav>
      <span>${post.username}</span>
      </nav>

      <p>${post.text}</p>
      <img src="/uploads/${post.image}" width="400">
    `;

    container.appendChild(div);

  });

}

loadUserPosts();
</script>
  </body>
</html>
