<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConnect Community</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="feed.css" />
  </head>
  <body>
    <div id="header">
      <span id="logo">&lt;/&gt;</span><span id="logoname">DevConnect</span>
      <input
        type="text"
        placeholder="&#128269; Search developers..."
        id="search"
      />
      <span id="bellicon">&#128276;</span>
      <button onclick="gototheprofile()" id="profile">
        <img src="default.png" alt="profilephoto" id="pp" />
      </button>
      <span id="un"></span>
    </div>

    <div id="container">
      <div id="thoughts">
        <button onclick="gototheprofile()" id="profile">
          <img src="default.png" alt="profilephoto" id="pp" />
        </button>
        <input
          type="text"
          placeholder="Share something with the devs...."
          id="in"
        />
      </div>
      <hr />
      <div id="btn">
        <button class="bg">📸 Photo</button>
        <button class="bg">📹 Video</button>
        <form action="/add.html" method="get">
        <button id="bg1" type="submit">Post</button>
        </form>
      </div>
    </div>


<div id="posts"></div>




    
    <script src="feed.js"></script>
  </body>
</html>
