<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
  </head>
  <style>
    .logo {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 40px;
    }

    .key {
      background: #1e293b;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 22px;
      font-family: "JetBrains Mono", monospace;
      border: 2px solid #334155;
      box-shadow: 0 4px 0 #0f172a;
      transition: transform 0.2s;
    }

    .key:hover {
      transform: translateY(-4px);
    }
    #symbol {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #logoheading {
      height: 52px;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 52px;
      background: #1e293b;
      color: white;
      border-radius: 6px;
      font-size: 15px;
      font-family: "JetBrains Mono", monospace;
      border: 2px solid #334155;
      box-shadow: 0 4px 0 #0f172a;
      transition: transform 0.2s;
    }
    #logoheading:hover{
        transform : translateY(-4px);
    }
  </style>
  <body>
    <h1 class="logo">
      <span class="key">D</span>
      <span class="key">E</span>
      <span class="key">V</span>
      <span class="key">C</span>
      <span class="key">O</span>
      <span class="key">N</span>
      <span class="key">N</span>
      <span class="key">E</span>
      <span class="key">C</span>
      <span class="key">T</span>
    </h1>
    <div id="symbol">
      <h1 id="logoheading">&lt;/&gt;</h1>
    </div>
  </body>
</html>
