<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConnect</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      form {
        display: flex;
        flex-direction: column;
        border: 2px solid black;
        border-radius: 10px;
        padding: 10px;
        gap: 10px;
        height: 50vh;
        width: 20vw;
      }
      #username {
        height: 30px;
      }
      #password {
        height: 30px;
      }
      #register {
        border: 2px solid black;
        display: flex;
        justify-content: center;
        text-decoration: none;
      }
      #login {
        border: 2px solid black;
        display: flex;
        justify-content: center;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>DevConnect</h1>
    <div class="register">
      <form action="/register" method="post">
        <input
          type="text"
          placeholder="enter the username"
          name="username"
          id="username"
        />
        <input
          type="password"
          placeholder="enter the password"
          name="userpassword"
          id="password"
        />
        <button type="submit">Register</button>
        <a href="login.html" id="login">Login</a>
      </form>
    </div>
  </body>
</html>
