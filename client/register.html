<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConnect</title>
    <link rel="stylesheet" href="register.css">
  </head>
  <body>
    <div class="code-bg">&lt;/&gt;</div>
    <div class="code-bg2">{ }</div>
    <h1>Register</h1>
    <div class="register">
      <form id="registerForm">
        <span class="h">Username</span>
        <input
          type="text"
          placeholder="enter the username"
          name="username"
          id="username"
        />
        <span class="h">Password</span>
        <input
          type="password"
          placeholder="enter the password"
          name="password"
          id="password"
        />
        <button type="submit" id="rg">Register</button>

        <a href="login.html" id="login">Existing User ? Login</a>
        <p id="message"></p>
      </form>
    </div>
    <script src="register.js"></script>
  </body>
</html>
